name: Split Learning
server:
  local-round: 1
  global-round: 1
  clients:
    - 1
    - 1
  no-cluster:
    cut-layers: [7]
  manual-cluster:
    num-cluster: 1
    cut-layers:
      - [7]

  model: VGG16
  data-name: CIFAR10
  parameters:
    load: False
    save: False
  validation: False
  data-distribution:
    non-iid: False
    num-sample: 5000
    num-label: 10
    dirichlet:
      alpha: 1
  random-seed: 1

rabbit:
  address: 127.0.0.1
  username: admin
  password: admin
  virtual-host: /

log_path: .
debug_mode: True

learning:
  learning-rate: 0.01
  momentum: 0.5
  batch-size: 32
