name: Split Learning
server:
  limited-time:
    enable: False
    epoch: 1
    time: 10 #(seconds)

  global-round: 1
  clients:
    - 1
    - 1
  num-cluster: 1
  cut-layers:
    - [7]
  infor-cluster:
    - [1,1]
  model: VGG16
  data-name: CIFAR10
  parameters:
    load: True
    save: True
  validation: True
  data-distribution:
    non-iid: False
    num-sample: 500
    num-label: 10

rabbit:
  address: 127.0.0.1
  username: admin
  password: admin
  virtual-host: /

log_path: .
debug_mode: True

learning:
  learning-rate: 0.01
  momentum: 0.5
  batch-size: 32
  control-count: 3
  clip-grad-norm: 0.0

profiling:
  round-train-test: 20
  round-comm-test: 100
  batch-size: 32
