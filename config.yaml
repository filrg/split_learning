name: Split Learning
server:
  limited-time:
    enable: False
    epoch: 1
    time: 10 #(seconds)

  global-round: 1
  clients:
    - 1
    - 1
  no-cluster:
    cut-layers: [1]
  manual-cluster:
    num-cluster: 1
    cut-layers:
      - [1]
    infor-cluster:
      - [1,1]
  model: KWT
  data-name: SPEECHCOMMANDS
  parameters:
    load: True
    save: True
  validation: True
  data-distribution:
    non-iid: False
    num-sample: 5000
    num-label: 10
    dirichlet:
      alpha: 1
    refresh-each-round: True
  random-seed: 1
  client-cluster:
    enable: False
    auto-cluster: False
    cluster: AffinityPropagation
    AffinityPropagation:
      damping: 0.9
      max_iter: 1000
    KMeans:
      num-cluster: 1

rabbit:
  address: 127.0.0.1
  username: admin
  password: admin
  virtual-host: /

log_path: .
debug_mode: True

learning:
  learning-rate: 0.0005
  momentum: 0.5
  batch-size: 32
  control-count: 3
  clip-grad-norm: 0.0

