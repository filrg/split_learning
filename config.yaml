name: Split Learning
server:
  global-round: 1
  clients:
    - 1
    - 1
  auto-mode: False

  model: VGG16
  data-name: CIFAR10
  parameters:
    load: True
    save: True
  validation: True

  data-distribution:
    non-iid: False
    num-sample: 5000
    num-label: 10
    dirichlet:
      alpha: 1
    refresh: True
  random-seed: 1

  manual:
    cluster-mode: False
    no-cluster:
      cut-layers: [1]
    cluster:
      num-cluster: 1
      cut-layers:
        - [1]
      infor-cluster:
        - [1,1]

  cluster-selection:
    num-cluster : 1
    algorithm-cluster: KMeans
    selection-mode: False

rabbit:
  address: 127.0.0.1
  username: admin
  password: admin
  virtual-host: /

log_path: .
debug_mode: True

learning:
  learning-rate: 0.0005
  weight-decay: 0.01
  momentum: 0.5
  batch-size: 32
  control-count: 3
